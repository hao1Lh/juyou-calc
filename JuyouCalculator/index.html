<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juyou 居游 | 旅居可行性规划师</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        juyou: {
                            bg: '#FFF9F0',
                            dark: '#1C212E',
                            orange: '#F97316',
                            green: '#F0FDF4',
                            greenText: '#15803D',
                            card: '#FFFFFF',
                        }
                    },
                    fontFamily: {
                        sans: ['"Noto Sans SC"', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 20px 40px -15px rgba(28, 33, 46, 0.08)',
                    },
                    keyframes: {
                        toastIn: {
                            '0%': { transform: 'translateY(-20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        bounceRight: {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '50%': { transform: 'translateX(5px)' },
                        }
                    },
                    animation: {
                        'toast': 'toastIn 0.3s cubic-bezier(0.16, 1, 0.3, 1)',
                        'bounce-right': 'bounceRight 1s infinite',
                    }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #FFF9F0; color: #1C212E; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* 选项卡片样式 */
        .option-card { transition: all 0.2s ease; border: 2px solid transparent; }
        .option-card.selected { border-color: #F97316; background-color: #FFF7ED; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(249, 115, 22, 0.1); }
        
        /* 标签样式 */
        .tag-chip { transition: all 0.2s; border: 1px solid #E2E8F0; }
        .tag-chip.selected { background-color: #F97316; color: white; border-color: #F97316; transform: scale(1.05); }
        
        .progress-bar { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* 微信遮罩 */
        .wx-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 9999;
            display: flex; flex-direction: column; align-items: flex-end; padding: 20px;
        }
        .wx-arrow { width: 60px; margin-right: 20px; transform: rotate(-10deg); }
        .wx-text { color: #fff; font-size: 18px; font-weight: bold; margin-top: 20px; text-align: center; width: 100%; line-height: 1.6; }
        .wx-highlight { color: #F97316; }
    </style>

    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "framer-motion": "https://esm.sh/framer-motion@11.0.8?external=react",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react"
      }
    }
    </script>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import ReactDOM from 'react-dom/client';
        import { motion, AnimatePresence } from 'framer-motion';
        import { ArrowRight, ArrowLeft, Wallet, Laptop, MapPin, Sparkles, Coffee, Plane, Share2, RefreshCcw, Loader2, Compass, Check, MessageCircle, Download, Heart, AlertTriangle, Lock } from 'lucide-react';
        

        // === 1. 限流配置 ===
        const DAILY_LIMIT = 3;

        const getRemainingUses = () => {
            return 9999;
			/*
			const today = new Date().toISOString().split('T')[0];
            const key = `juyou_usage_${today}`;
            const used = parseInt(localStorage.getItem(key) || '0');
            return Math.max(0, DAILY_LIMIT - used);*/
        };

        const incrementUsage = () => {
			return
			/*
            const today = new Date().toISOString().split('T')[0];
            const key = `juyou_usage_${today}`;
            const used = parseInt(localStorage.getItem(key) || '0');
            localStorage.setItem(key, used + 1);*/
        };

        // === 2. 数据配置 ===
        const MODES = [
            { id: 'A', label: "极简躺平 / 中国", sub: "大理、海南、安吉等", baseCost: 3500, img: "🍵" },
            { id: 'B', label: "高性价比 / 东南亚", sub: "清迈、岘港、巴厘岛等", baseCost: 6000, img: "🌴" },
            { id: 'C', label: "数字游民 / 欧美日澳", sub: "东京、里斯本、美加等", baseCost: 12000, img: "🏙️" }
        ];

        const VIBES = [
            { id: 'A', label: "极简生活", sub: "低物欲躺平", coef: 0.8, img: "🧘" },
            { id: 'B', label: "旅居生活", sub: "正常探索吃喝玩乐", coef: 1.2, img: "📷" },
            { id: 'C', label: "度假模式", sub: "闭眼体验新生活", coef: 2.0, img: "🍹" }
        ];

        const PREFS = [
            { id: 'coffee', label: "☕️ 咖啡中毒" },
            { id: 'mountain', label: "🏔️ 山系生活" },
            { id: 'ocean', label: "🌊 只有大海" },
            { id: 'chill', label: "🍃 绝对Chill" },
            { id: 'party', label: "💃 夜生活/派对" },
            { id: 'history', label: "🏛️ 历史古迹" },
            { id: 'cyber', label: "🌃 赛博朋克" },
            { id: 'yoga', label: "🧘‍♀️ 灵性/瑜伽" },
            { id: 'food', label: "🍜 街头美食" },
        ];

        // === 3. AI 生成逻辑 ===
	// ✅ 新版 generateReport 函数 (复制替换原来的)
	const generateReport = async (data, mathResult) => {
    	    const modeInfo = MODES.find(m => m.id === data.mode);
    	    const selectedPrefLabels = data.prefs.map(pid => PREFS.find(p => p.id === pid)?.label).join(', ');
            const durationText = mathResult.isInfinite ? "无限期" : `${mathResult.months.toFixed(1)} 个月`;

    	    // 1. 准备提示词 (保持不变)
            const prompt = `
            Role: Juyou 居游·资深全球旅居顾问
            User Profile:
            - 存款: ¥${data.savings}
            - 收入: ¥${data.income}/月
   	    - 预算: ${modeInfo.label}
    	    - 偏好: [${selectedPrefLabels}]
    	    - 可生存: ${durationText}

    	    Task: 生成 JSON 报告。Tone: 积极、热血、治愈、鼓舞人心。
    	    Logic: 必须严格符合用户的[${selectedPrefLabels}]偏好。例如"山"+ "Chill" -> 清迈/大理。

    	    Output JSON ONLY:
    	    {
        	"persona": "4-6字有趣标签",
        	"quote": "非常积极、鼓舞人心的短评。",
        	"city": "具体城市名",
        	"cityReason": "推荐理由",
        	"advice1": "技能变现建议",
        	"advice2": "资金或行动建议"
    	    }
    	    `;

   	    try {
       		 
        	const response = await fetch('/api/gemini', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
        	});

                if (!response.ok) {
            	   throw new Error(`服务请求失败: ${response.status}`);
        	}
        
        	const result = await response.json();
        
       
        	const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
        
        	if (!text) throw new Error("AI 返回了空数据");

        
        	const jsonStr = text.replace(/```json|```/g, '').trim();
        	return JSON.parse(jsonStr);

   	    } catch (e) {
        	console.error("生成报告出错:", e);
        	return {
            		isError: true,
            		persona: "连接中断",
            		quote: "请稍后重试",
            		city: "API Error",
            		cityReason: `错误详情: ${e.message || "未知错误"}`,
            		advice1: "请检查网络",
            		advice2: "或者联系管理员"
        	       };
    	     }
	};

        
        // === 4. 组件部分 ===
        const WeChatGuide = () => {
            const [isWeChat, setIsWeChat] = useState(false);
            useEffect(() => {
                const ua = navigator.userAgent.toLowerCase();
                if (ua.match(/MicroMessenger/i) == "micromessenger") { setIsWeChat(true); }
            }, []);
            if (!isWeChat) return null;
            return (
                <div className="wx-mask">
                    <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/2934.png" className="wx-arrow animate-bounce-right" alt="arrow"/>
                    <div className="wx-text"><p>由于微信限制，请点击右上角 <span className="text-2xl">...</span></p><p className="mt-2">选择 <span className="wx-highlight">在浏览器打开</span></p><p className="mt-4 text-sm opacity-60">以获得最佳体验 ✨</p></div>
                </div>
            );
        };

        const Toast = ({ message, onClose, type = 'success' }) => {
            useEffect(() => { const timer = setTimeout(onClose, 2500); return () => clearTimeout(timer); }, [onClose]);
            const bg = type === 'error' ? 'bg-red-500' : 'bg-slate-800';
            const icon = type === 'error' ? <Lock size={16} /> : <Check size={16} className="text-green-400" />;
            return (
                <div className="fixed top-8 left-0 right-0 z-50 flex justify-center pointer-events-none">
                    <div className={`${bg} text-white px-6 py-3 rounded-full shadow-lg flex items-center gap-2 animate-toast`}>
                        {icon} <span className="text-sm font-bold">{message}</span>
                    </div>
                </div>
            );
        };

        const Welcome = ({ onStart }) => (
            <div className="min-h-screen flex flex-col items-center justify-center p-6 relative bg-juyou-bg text-juyou-dark overflow-hidden">
                <div className="absolute top-20 right-10 opacity-20 animate-pulse"><Plane size={80} className="text-juyou-orange rotate-12" /></div>
                <div className="absolute bottom-20 left-10 opacity-10"><Compass size={100} className="text-juyou-dark -rotate-12" /></div>
                <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="z-10 text-center max-w-sm w-full">
                    <div className="flex justify-center gap-4 mb-8">
                        <div className="w-16 h-16 bg-white rounded-2xl shadow-sm flex items-center justify-center border border-orange-100 transform rotate-[-5deg]"><Compass size={32} className="text-juyou-orange" /></div>
                        <div className="w-16 h-16 bg-white rounded-2xl shadow-sm flex items-center justify-center border border-orange-100 mt-4 z-10"><Plane size={32} className="text-teal-600" /></div>
                        <div className="w-16 h-16 bg-white rounded-2xl shadow-sm flex items-center justify-center border border-orange-100 transform rotate-[5deg]"><MapPin size={32} className="text-slate-600" /></div>
                    </div>
                    <h1 className="text-4xl font-black mb-2 tracking-tight text-juyou-dark">Juyou 居游</h1>
                    <p className="text-lg text-slate-500 font-medium mb-10">人生可行性规划师</p>
                    <div className="mb-12 space-y-2 font-medium">
                        <p className="text-slate-600">有人 2 万块在大理躺了一年，</p>
                        <p className="text-slate-600">有人 20 万在上海撑不过半年。</p>
                        <p className="text-juyou-dark font-bold text-lg mt-4">你的自由进度条走到哪了？</p>
                    </div>
                    <button onClick={onStart} className="w-full bg-juyou-dark text-white font-bold py-4 rounded-xl text-lg shadow-xl hover:bg-slate-800 transition-all active:scale-95 flex items-center justify-center gap-2">
                        开始测算 <ArrowRight size={20} />
                    </button>
                    <p className="mt-8 text-[10px] text-slate-400 font-mono tracking-widest uppercase">MAKE YOUR LIFE L!VE</p>
                </motion.div>
            </div>
        );

        const Form = ({ onSubmit }) => {
            const [step, setStep] = useState(0);
            const [data, setData] = useState({ savings: '', income: '', mode: 'A', vibe: 'B', skills: '', prefs: [] });
            const [remaining, setRemaining] = useState(getRemainingUses());

            const questions = [
                { key: 'savings', label: '现有“赎身”存款', sub: '大约多少人民币？这是你的底气。', icon: Wallet, type: 'number', placeholder: '50000' },
                { key: 'income', label: '被动/远程月收入', sub: '如果没有就填 0。', icon: Laptop, type: 'number', placeholder: '0' },
                { key: 'mode', label: '理想生活预算', sub: '你想去什么消费水平的地方？', icon: Coffee, type: 'select', options: MODES },
                { key: 'prefs', label: '你的灵魂偏好', sub: '多选 (最多选3个)，为你匹配最佳氛围', icon: Heart, type: 'multi-select', options: PREFS },
                { key: 'vibe', label: '日常消费习惯', sub: '你是哪种生活风格？', icon: Sparkles, type: 'select', options: VIBES },
                { key: 'skills', label: '核心技能/特长', sub: '写作、代码、或是擅长发呆？', icon: Sparkles, type: 'text', placeholder: '例如：摄影、剪辑、会吃会玩...' },
            ];

            const handleNext = () => {
                if (questions[step].type === 'multi-select' && data.prefs.length === 0) {
                    alert("请至少选择一个偏好哦~"); 
                    return;
                }
                
                // === 检查限流 ===
                if (step === questions.length - 1) {
                    if (remaining <= 0) {
                        alert("今日测算次数已用完，请明天再来探索世界吧！🌍");
                        return;
                    }
                    onSubmit({ ...data, savings: Number(data.savings), income: Number(data.income) });
                } else {
                    setStep(step + 1);
                }
            };

            const togglePref = (id) => {
                const current = data.prefs;
                if (current.includes(id)) { setData({ ...data, prefs: current.filter(p => p !== id) }); } 
                else { if (current.length >= 3) return; setData({ ...data, prefs: [...current, id] }); }
            };

            const curr = questions[step];

            return (
                <div className="min-h-screen bg-juyou-bg flex flex-col items-center justify-center p-6">
                    <div className="fixed top-0 left-0 w-full h-1.5 bg-slate-200"><div className="h-full bg-juyou-dark progress-bar" style={{ width: `${((step + 1) / questions.length) * 100}%` }}></div></div>
                    <AnimatePresence mode="wait"><motion.div key={step} initial={{ opacity: 0, scale: 0.95 }} animate={{ opacity: 1, scale: 1 }} exit={{ opacity: 0, scale: 1.05 }} className="w-full max-w-sm bg-white rounded-[32px] p-8 shadow-soft border border-white">
                        <div className="w-14 h-14 rounded-full bg-orange-50 flex items-center justify-center text-juyou-orange mb-6 border border-orange-100"><curr.icon size={28} /></div>
                        <h2 className="text-2xl font-bold text-juyou-dark mb-2">{curr.label}</h2><p className="text-slate-500 mb-8 text-sm">{curr.sub}</p>
                        {(curr.type === 'number' || curr.type === 'text') && (<div className="relative">{curr.type === 'number' && <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl font-light">¥</span>}<input autoFocus type={curr.type} value={data[curr.key]} onChange={e => setData({...data, [curr.key]: e.target.value})} className={`w-full bg-white border-2 border-slate-100 rounded-xl py-4 ${curr.type === 'number' ? 'pl-10 text-3xl' : 'px-4 text-xl'} font-bold text-juyou-dark focus:outline-none focus:border-juyou-orange focus:ring-4 focus:ring-orange-50 transition-all placeholder:text-slate-200`} placeholder={curr.placeholder} /></div>)}
                        {curr.type === 'select' && (<div className="space-y-3">{curr.options.map(opt => (<div key={opt.id} onClick={() => setData({...data, [curr.key]: opt.id})} className={`option-card relative p-4 rounded-xl cursor-pointer flex items-center gap-4 ${data[curr.key] === opt.id ? 'selected shadow-md' : 'bg-white border-slate-100 hover:border-orange-200'}`}><div className="text-3xl">{opt.img}</div><div><div className="font-bold text-juyou-dark text-sm">{opt.label}</div><div className="text-xs text-slate-400 mt-0.5">{opt.sub}</div></div>{data[curr.key] === opt.id && <div className="absolute right-4 text-juyou-orange"><Check size={20}/></div>}</div>))}</div>)}
                        {curr.type === 'multi-select' && (<div className="flex flex-wrap gap-2">{curr.options.map(opt => (<button key={opt.id} onClick={() => togglePref(opt.id)} className={`tag-chip px-4 py-2 rounded-full text-sm font-bold ${data.prefs.includes(opt.id) ? 'selected' : 'bg-white text-slate-600 hover:bg-slate-50'}`}>{opt.label}</button>))}</div>)}
                        
                        {/* ⚠️ UI 修复：完美复刻截图样式 */}
                        <div className="flex justify-between items-center mt-10">
                            {/* 左侧：极简返回箭头 */}
                            <button 
                                onClick={() => setStep(s => Math.max(0, s-1))} 
                                disabled={step === 0}
                                className={`p-2 transition-colors ${step===0 ? 'opacity-0 pointer-events-none' : 'text-slate-400 hover:text-slate-600'}`}
                            >
                                <ArrowLeft size={24} />
                            </button>

                            {/* 右侧：紧凑型下一步按钮 */}
                            <button 
                                onClick={handleNext} 
                                disabled={step === questions.length - 1 && remaining <= 0}
                                className={`bg-juyou-dark text-white font-bold px-8 py-3 rounded-xl shadow-lg flex items-center gap-2 active:scale-95 transition-all
                                ${step === questions.length - 1 && remaining <= 0 ? 'bg-slate-400 cursor-not-allowed' : 'hover:bg-slate-800'}`}
                            >
                                <span>
                                    {step === questions.length - 1 
                                        ? (remaining <= 0 ? '次数已尽' : '生成报告') 
                                        : '下一步'}
                                </span>
                                <ArrowRight size={20} />
                            </button>
                        </div>

                    </motion.div></AnimatePresence>
                </div>
            );
        };

        const Loading = () => {
            const texts = ["正在联系 Juyou 星球总部...", "分析全球物价指数...", "匹配你的灵魂栖息地...", "计算分析物价指数...", "正在把焦虑转换成里程..."];
            const [index, setIndex] = useState(0);
            useEffect(() => { const timer = setInterval(() => { setIndex((prev) => (prev + 1) % texts.length); }, 1800); return () => clearInterval(timer); }, []);
            return (
                <div className="min-h-screen bg-juyou-bg flex flex-col items-center justify-center p-6">
                    <motion.div animate={{ rotate: 360 }} transition={{ repeat: Infinity, duration: 2, ease: "linear" }}><Loader2 className="w-12 h-12 text-juyou-orange" /></motion.div>
                    <div className="h-10 mt-8 flex items-center justify-center overflow-hidden w-full relative">
                        <AnimatePresence mode="wait"><motion.p key={index} initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -20 }} className="text-juyou-dark font-bold text-sm absolute text-center w-full">{texts[index]}</motion.p></AnimatePresence>
                    </div>
                </div>
            );
        };

        const Result = ({ math, ai, onReset }) => {
            const [toast, setToast] = useState(null); 
            const [isSaving, setIsSaving] = useState(false);
            const WECHAT_ID = "Likh_9966"; 

            const triggerToast = (msg, type='success') => { setToast({msg, type}); };
            const closeToast = () => setToast(null);

            const handleCopyWechat = () => { navigator.clipboard.writeText(WECHAT_ID).then(() => triggerToast(`微信号 ${WECHAT_ID} 已复制！`)); };
            const handleShare = async () => {
                if (navigator.share) {
                    try { await navigator.share({ title: 'Juyou 居游 - 旅居可行性报告', text: `我的旅居人格是：${ai.persona}，自由倒计时：${math.isInfinite ? '无限期' : math.months.toFixed(1) + '个月'}！`, url: window.location.href }); } catch (err) { console.log('分享取消'); }
                } else { navigator.clipboard.writeText(window.location.href).then(() => triggerToast("链接已复制，快发给朋友吧！")); }
            };
            const handleSaveImage = async () => {
                setIsSaving(true);
                const element = document.getElementById('result-card');
                if (!element) return;
                try {
                    await new Promise(resolve => setTimeout(resolve, 300));
                    const canvas = await window.html2canvas(element, { scale: 3, useCORS: true, backgroundColor: '#ffffff', scrollY: -window.scrollY, onclone: (clonedDoc) => { const clonedElement = clonedDoc.getElementById('result-card'); if(clonedElement) { clonedElement.style.transform = 'none'; } } });
                    const link = document.createElement('a'); link.download = `juyou-report-${Date.now()}.png`; link.href = canvas.toDataURL('image/png'); link.click(); triggerToast("名片已生成，正在下载...");
                } catch (err) { console.error(err); triggerToast("生成失败，请手动截图保存", 'error'); }
                setIsSaving(false);
            };

            return (
                <div className="min-h-screen bg-juyou-bg p-4 flex items-center justify-center relative">
                    {toast && <Toast message={toast.msg} type={toast.type} onClose={closeToast} />}
                    <motion.div id="result-card" initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="w-full max-w-sm bg-white rounded-[24px] overflow-hidden shadow-2xl relative border border-slate-100">
                        <div className="bg-juyou-dark text-white p-5 pt-6 relative">
                            <div className="flex justify-between items-start mb-2">
                                <div><div className="text-[10px] font-bold opacity-60 uppercase tracking-widest">JUYOU 居游</div><h2 className="text-xl font-bold mt-1">旅居可行性报告</h2></div>
                                <button onClick={handleShare} className="opacity-80 hover:opacity-100 transition-opacity"><Share2 size={20} /></button>
                            </div>
                        </div>
                        <div className="p-6">
                            
                            {/* 错误提示处理 */}
                            {ai.isError ? (
                                <div className="text-center p-4">
                                    <div className="bg-red-50 text-red-600 p-4 rounded-xl text-sm font-mono mb-4 text-left break-all border border-red-200">
                                        <div className="flex items-center gap-2 font-bold mb-2"><AlertTriangle size={16}/> 发生错误</div>
                                        {ai.cityReason}
                                    </div>
                                    <p className="text-slate-500 text-sm">请检查网络或 API Key 设置</p>
                                </div>
                            ) : (
                                <>
                                    <div className="text-center mb-8 mt-2">
                                        <span className="inline-block bg-orange-100 text-juyou-orange px-3 py-1 rounded-full text-xs font-bold mb-3">你的旅居人格</span>
                                        <h1 className="text-3xl font-black text-juyou-dark tracking-tight">{ai.persona}</h1>
                                    </div>
                                    <div className="bg-orange-50 rounded-2xl p-6 text-center border border-orange-100 mb-6">
                                        <div className="flex items-center justify-center gap-1 text-slate-500 text-xs mb-2"><Coffee size={12} /> 你的自由倒计时</div>
                                        <div className="text-5xl font-black text-juyou-orange mb-3">{math.isInfinite ? "∞" : math.months.toFixed(1)} <span className="text-xl">个月</span></div>
                                        <p className="text-sm text-slate-600 italic font-serif leading-relaxed">"{ai.quote}"</p>
                                    </div>
                                    <div className="bg-juyou-green rounded-2xl p-5 border border-green-100 mb-8">
                                        <div className="flex items-center gap-2 font-bold text-juyou-dark mb-2"><MapPin size={18} className="text-emerald-600" /> AI 推荐灵魂栖息地</div>
                                        <div className="text-lg font-bold text-emerald-800 mb-1">{ai.city}</div>
                                        <div className="text-xs text-emerald-700 leading-relaxed opacity-80">{ai.cityReason}</div>
                                    </div>
                                    <div className="space-y-4 mb-8">
                                        <h3 className="font-bold text-juyou-dark flex items-center gap-2"><Sparkles size={18} className="text-orange-400" /> Juyou 居游·行动建议</h3>
                                        <div className="flex gap-3 text-sm text-slate-600"><span className="flex-shrink-0 w-5 h-5 bg-slate-100 text-slate-500 rounded-full flex items-center justify-center text-xs font-bold mt-0.5">1</span><span>{ai.advice1}</span></div>
                                        <div className="flex gap-3 text-sm text-slate-600"><span className="flex-shrink-0 w-5 h-5 bg-slate-100 text-slate-500 rounded-full flex items-center justify-center text-xs font-bold mt-0.5">2</span><span>{ai.advice2}</span></div>
                                    </div>
                                </>
                            )}
                            
                            <div className="bg-juyou-dark rounded-2xl p-5 text-center relative overflow-hidden">
                                <div className="relative z-10">
                                    <div className="font-bold text-white mb-1 flex items-center justify-center gap-1">🎁 加入 Juyou 旅居社群</div>
                                    <div className="text-[10px] text-slate-400 mb-4">与 10,000+ 数字游民共享全球情报</div>
                                    <button onClick={handleCopyWechat} className="w-full bg-gradient-to-r from-orange-500 to-orange-600 hover:from-orange-400 hover:to-orange-500 text-white font-bold py-3 rounded-lg text-sm shadow-lg flex items-center justify-center gap-2 transition-all active:scale-95"><MessageCircle size={16} /> 添加小助理进群 (点击复制)</button>
                                </div>
                            </div>

                            <div className="mt-6 space-y-3" data-html2canvas-ignore="true">
                                <button onClick={handleSaveImage} disabled={isSaving} className="w-full py-3 border border-juyou-dark rounded-xl font-bold text-juyou-dark flex items-center justify-center gap-2 hover:bg-slate-50 transition-colors disabled:opacity-50">{isSaving ? <Loader2 className="animate-spin" size={16}/> : <Download size={16} />} {isSaving ? '正在生成...' : '生成我的旅居名片'}</button>
                                <button onClick={onReset} className="w-full text-center text-xs text-slate-400 flex items-center justify-center gap-1 hover:text-slate-600"><RefreshCcw size={12} /> 重新测算</button>
                            </div>
                        </div>
                    </motion.div>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('welcome');
            const [math, setMath] = useState(null);
            const [ai, setAi] = useState(null);

            const calculate = (data) => {
                const mode = MODES.find(m => m.id === data.mode);
                const vibe = VIBES.find(v => v.id === data.vibe);
                const monthlyCost = mode.baseCost * vibe.coef;
                const netBurn = monthlyCost - data.income;
                let months = 0; let isInfinite = false;
                if (netBurn <= 0) { isInfinite = true; months = 9999; } else { months = data.savings / netBurn; }
                return { months, isInfinite };
            };
            const handleSubmit = async (data) => {
                // 扣除次数
                incrementUsage();
                setView('loading');
                const mathRes = calculate(data);
                setMath(mathRes);
                const aiRes = await generateReport(data, mathRes);
                setAi(aiRes);
                setView('result');
            };

            return (
                <>
               
                    {view === 'welcome' && <Welcome onStart={() => setView('form')} />}
                    {view === 'form' && <Form onSubmit={handleSubmit} />}
                    {view === 'loading' && <Loading />}
                    {view === 'result' && <Result math={math} ai={ai} onReset={() => setView('welcome')} />}
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
